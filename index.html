<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Gym Motion Puncher</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                margin: 0;
                overflow: hidden;
                background-color: #2c3e50;
                font-family: "Poppins", sans-serif;
                touch-action: none;
                user-select: none;
            }

            #canvas-container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 1;
            }

            /* Modern Gym UI */
            #ui {
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
                font-size: 20px;
                font-weight: 900;
                color: #fff;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px 25px;
                border-radius: 8px;
                border: 2px solid #e74c3c;
                box-shadow: 0px 4px 0px #c0392b;
                pointer-events: none;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            #instructions {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.6);
                color: #fff;
                padding: 10px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 700;
                z-index: 10;
                pointer-events: none;
                white-space: nowrap;
                text-align: center;
            }

            /* --- STORE UI --- */
            #store-btn {
                position: absolute;
                bottom: 20px;
                right: 20px;
                z-index: 10;
                background: #f39c12;
                color: #fff;
                border: none;
                padding: 15px 20px;
                font-family: "Poppins", sans-serif;
                font-size: 16px;
                font-weight: 900;
                border-radius: 8px;
                cursor: pointer;
                box-shadow: 0px 4px 0px #e67e22;
                transition: 0.1s ease;
            }
            #store-btn:active {
                transform: translateY(4px);
                box-shadow: 0px 0px 0px #e67e22;
            }

            #store-panel {
                position: absolute;
                top: 0;
                right: -350px;
                width: 300px;
                height: 100vh;
                background: rgba(44, 62, 80, 0.95);
                z-index: 20;
                transition: right 0.3s ease;
                padding: 20px;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                border-left: 4px solid #f39c12;
                color: white;
            }
            #store-panel.open {
                right: 0;
            }

            .close-btn {
                background: #e74c3c;
                color: white;
                border: none;
                padding: 10px;
                font-family: "Poppins", sans-serif;
                font-size: 14px;
                font-weight: bold;
                border-radius: 5px;
                cursor: pointer;
                margin-bottom: 20px;
            }
            .store-item {
                background: #34495e;
                padding: 15px;
                margin-bottom: 15px;
                border-radius: 8px;
                cursor: pointer;
                border: 2px solid transparent;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-weight: bold;
                transition: 0.2s;
            }
            .store-item:hover {
                background: #3b536b;
            }
            .store-item.locked {
                opacity: 0.6;
            }
            .store-item.equipped {
                border-color: #2ecc71;
                background: #27ae60;
                opacity: 1;
            }

            /* Start Screen */
            #start-screen {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(44, 62, 80, 0.95);
                z-index: 50;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                color: white;
            }
            #start-screen h1 {
                margin: 0 0 10px 0;
                font-size: 32px;
                font-weight: 900;
                color: #e74c3c;
                text-shadow: 2px 2px 0px #000;
            }
            #start-screen p {
                margin: 0 0 30px 0;
                max-width: 80%;
                font-size: 14px;
                color: #bdc3c7;
            }

            #start-btn {
                background: #e74c3c;
                border: none;
                padding: 15px 40px;
                border-radius: 8px;
                font-family: "Poppins", sans-serif;
                font-size: 20px;
                font-weight: 900;
                color: white;
                cursor: pointer;
                box-shadow: 0px 6px 0px #c0392b;
                transition: 0.1s ease;
            }
            #start-btn:active {
                transform: translateY(6px);
                box-shadow: 0px 0px 0px #c0392b;
            }

            .hit-text {
                position: absolute;
                color: #f1c40f;
                font-weight: 900;
                font-size: 35px;
                pointer-events: none;
                text-shadow: 3px 3px 0px #000;
                z-index: 5;
                animation: floatUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)
                    forwards;
            }
            @keyframes floatUp {
                0% {
                    opacity: 1;
                    transform: translateY(0) scale(0.5) rotate(-10deg);
                }
                100% {
                    opacity: 0;
                    transform: translateY(-100px) scale(1.5) rotate(10deg);
                }
            }
        </style>
    </head>
    <body>
        <div id="start-screen">
            <h1>🥊 GYM PUNCHER</h1>
            <p>THRUST DEVICE FORWARD = JAB<br />SWING LEFT/RIGHT = HOOKS</p>
            <button id="start-btn" onclick="initGame()">ENTER GYM</button>
        </div>

        <div id="ui">SCORE: <span id="coin-count">0</span></div>
        <div id="instructions">TAP SCREEN OR SWING PHONE</div>

        <button id="store-btn" onclick="toggleStore()">🛒 SHOP</button>

        <div id="store-panel">
            <button class="close-btn" onclick="toggleStore()">
                ❌ CLOSE SHOP
            </button>
            <h2 style="margin-top: 0; color: #f39c12; font-weight: 900">
                PRO SHOP
            </h2>

            <div
                class="store-item equipped"
                id="item-basic"
                onclick="buyOrEquip('basic')"
            >
                <span>🥊 Red Gloves</span> <span>Owned</span>
            </div>
            <div
                class="store-item locked"
                id="item-power"
                onclick="buyOrEquip('power')"
            >
                <span>🥊 Blue Power</span> <span>💰 200</span>
            </div>
            <div
                class="store-item locked"
                id="item-gold"
                onclick="buyOrEquip('gold')"
            >
                <span>🥊 Golden Fists</span> <span>💰 1000</span>
            </div>
        </div>

        <div id="canvas-container"></div>

        <script>
            // --- STORE LOGIC & GAME STATE ---
            let coins = 0;
            const uiCoins = document.getElementById("coin-count");

            const store = {
                basic: { cost: 0, unlocked: true, damage: 10, color: 0xe74c3c }, // Red
                power: {
                    cost: 200,
                    unlocked: false,
                    damage: 25,
                    color: 0x3498db,
                }, // Blue
                gold: {
                    cost: 1000,
                    unlocked: false,
                    damage: 100,
                    color: 0xf1c40f,
                }, // Gold
            };
            let currentGlove = "basic";

            function toggleStore() {
                document.getElementById("store-panel").classList.toggle("open");
            }

            function buyOrEquip(id) {
                let item = store[id];

                // Buying Logic
                if (!item.unlocked) {
                    if (coins >= item.cost) {
                        coins -= item.cost;
                        uiCoins.innerText = coins;
                        item.unlocked = true;
                        document
                            .getElementById(`item-${id}`)
                            .classList.remove("locked");
                        document.getElementById(
                            `item-${id}`,
                        ).children[1].innerText = "Owned";
                    } else {
                        alert("Not enough coins to buy this!");
                        return; // Stop here if they can't afford it
                    }
                }

                // Equipping Logic
                currentGlove = id;
                document
                    .querySelectorAll(".store-item")
                    .forEach((el) => el.classList.remove("equipped"));
                document.getElementById(`item-${id}`).classList.add("equipped");

                // Update 3D Model Color
                gloveMat.color.setHex(item.color);
            }

            // --- THREE.JS SETUP ---
            const container = document.getElementById("canvas-container");
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2c3e50);
            scene.fog = new THREE.Fog(0x2c3e50, 30, 80);

            const camera = new THREE.PerspectiveCamera(
                65,
                window.innerWidth / window.innerHeight,
                0.1,
                1000,
            );
            camera.position.set(0, -2, 35);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(0, 30, 20);
            spotLight.angle = Math.PI / 4;
            spotLight.penumbra = 0.5;
            spotLight.castShadow = true;
            scene.add(spotLight);

            // --- GYM ENVIRONMENT ---
            const floorGeo = new THREE.PlaneGeometry(120, 120);
            const floorMat = new THREE.MeshToonMaterial({ color: 0xd35400 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -15;
            floor.receiveShadow = true;
            scene.add(floor);

            const wallGeo = new THREE.PlaneGeometry(120, 60);
            const wallMat = new THREE.MeshToonMaterial({ color: 0x7f8c8d });
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(0, 10, -20);
            wall.receiveShadow = true;
            scene.add(wall);

            const mirrorGeo = new THREE.PlaneGeometry(40, 20);
            const mirrorMat = new THREE.MeshStandardMaterial({
                color: 0xbdc3c7,
                roughness: 0.2,
                metalness: 0.8,
            });
            const mirror = new THREE.Mesh(mirrorGeo, mirrorMat);
            mirror.position.set(0, 0, -19.5);
            scene.add(mirror);

            // --- THE PUNCHING BAG (NO OUTLINES) ---
            const pivot = new THREE.Group();
            pivot.position.set(0, 15, 0);
            scene.add(pivot);

            const ropeMat = new THREE.MeshToonMaterial({ color: 0x34495e });
            const ropeGeo = new THREE.CylinderGeometry(0.3, 0.3, 10, 8);
            const rope = new THREE.Mesh(ropeGeo, ropeMat);
            rope.position.y = -5;
            rope.castShadow = true;
            pivot.add(rope);

            const bagGroup = new THREE.Group();
            bagGroup.position.y = -13;
            pivot.add(bagGroup);

            const bagMat = new THREE.MeshToonMaterial({ color: 0x2980b9 });

            const bodyGeo = new THREE.CylinderGeometry(3, 3, 7, 16);
            const bodyMesh = new THREE.Mesh(bodyGeo, bagMat);
            bodyMesh.castShadow = true;

            const topHemiGeo = new THREE.SphereGeometry(
                3,
                16,
                8,
                0,
                Math.PI * 2,
                0,
                Math.PI / 2,
            );
            const topHemi = new THREE.Mesh(topHemiGeo, bagMat);
            topHemi.position.y = 3.5;

            const botHemiGeo = new THREE.SphereGeometry(
                3,
                16,
                8,
                0,
                Math.PI * 2,
                Math.PI / 2,
                Math.PI / 2,
            );
            const botHemi = new THREE.Mesh(botHemiGeo, bagMat);
            botHemi.position.y = -3.5;

            bagGroup.add(bodyMesh, topHemi, botHemi);

            // --- 3D REALISTIC BOXING GLOVES (NO OUTLINES) ---
            // Create a shared material so updating the store updates both gloves instantly
            const gloveMat = new THREE.MeshToonMaterial({
                color: store.basic.color,
            });

            function createGlove(isLeft) {
                const gloveGroup = new THREE.Group();

                // 1. Main Padding (Fist)
                const fistGeo = new THREE.SphereGeometry(1.8, 16, 16);
                const fist = new THREE.Mesh(fistGeo, gloveMat);
                fist.scale.set(1, 1.2, 1.3);
                gloveGroup.add(fist);

                // 2. Wrist Cuff
                const cuffGeo = new THREE.CylinderGeometry(1.3, 1.5, 2, 16);
                const cuff = new THREE.Mesh(cuffGeo, gloveMat);
                cuff.position.set(0, -2, 0);
                gloveGroup.add(cuff);

                // 3. Thumb
                const thumbGeo = new THREE.SphereGeometry(0.8, 16, 16);
                const thumb = new THREE.Mesh(thumbGeo, gloveMat);
                thumb.scale.set(1, 1.4, 1);
                thumb.position.set(isLeft ? 1.4 : -1.4, -0.2, 0.8);
                thumb.rotation.z = isLeft ? -0.4 : 0.4;
                gloveGroup.add(thumb);

                return gloveGroup;
            }

            const leftGlove = createGlove(true);
            const rightGlove = createGlove(false);

            const leftRest = new THREE.Vector3(-3.5, -4.5, -12);
            const rightRest = new THREE.Vector3(3.5, -4.5, -12);

            leftGlove.position.copy(leftRest);
            rightGlove.position.copy(rightRest);

            camera.add(leftGlove);
            camera.add(rightGlove);
            scene.add(camera);

            // --- PHYSICS & ANIMATION VARIABLES ---
            let velX = 0,
                velZ = 0;
            const spring = 0.05,
                friction = 0.92;
            let scaleTarget = 1;

            let activeGlove = null;
            let punchProgress = 0;
            let punchTarget = new THREE.Vector3();
            let isPunching = false;

            let lastPunchTime = 0;
            const PUNCH_COOLDOWN = 350;

            // --- START GAME & SENSORS ---
            async function initGame() {
                try {
                    if (document.documentElement.requestFullscreen)
                        await document.documentElement.requestFullscreen();
                    if (screen.orientation && screen.orientation.lock)
                        await screen.orientation.lock("landscape");
                } catch (err) {
                    console.log("Orientation lock not supported.");
                }

                document.getElementById("start-screen").style.display = "none";

                if (typeof DeviceMotionEvent.requestPermission === "function") {
                    DeviceMotionEvent.requestPermission()
                        .then((permissionState) => {
                            if (permissionState === "granted")
                                window.addEventListener(
                                    "devicemotion",
                                    handleMotion,
                                );
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener("devicemotion", handleMotion);
                }
            }

            // --- MOTION LOGIC ---
            function handleMotion(event) {
                let accX = event.acceleration.x;
                let accZ = event.acceleration.z;
                if (accX === null) return;

                let now = Date.now();
                if (now - lastPunchTime < PUNCH_COOLDOWN || isPunching) return;

                const THRESHOLD_FORWARD = -7;
                const THRESHOLD_SIDE = 6;

                if (accZ < THRESHOLD_FORWARD) {
                    triggerPunchAnim("straight");
                    lastPunchTime = now;
                } else if (accX < -THRESHOLD_SIDE) {
                    triggerPunchAnim("left");
                    lastPunchTime = now;
                } else if (accX > THRESHOLD_SIDE) {
                    triggerPunchAnim("right");
                    lastPunchTime = now;
                }
            }

            // --- VISUAL PUNCH LOGIC ---
            const punchSounds = ["SMASH!", "BAM!", "CRACK!", "BOOM!"];

            function triggerPunchAnim(type) {
                isPunching = true;
                punchProgress = 0;

                if (type === "straight") {
                    activeGlove = rightGlove;
                    punchTarget.set(0, 0, -22);
                    velZ -= 0.6;
                    activeGlove.rotation.z = -Math.PI / 2;
                } else if (type === "left") {
                    activeGlove = leftGlove;
                    punchTarget.set(2, 2, -20);
                    velX += 0.4;
                    velZ -= 0.3;
                    activeGlove.rotation.z = Math.PI / 4;
                } else if (type === "right") {
                    activeGlove = rightGlove;
                    punchTarget.set(-2, 2, -20);
                    velX -= 0.4;
                    velZ -= 0.3;
                    activeGlove.rotation.z = -Math.PI / 4;
                }

                setTimeout(() => {
                    spawnHitEffect(type);
                }, 100);
            }

            function spawnHitEffect(type) {
                // Apply damage based on equipped glove!
                coins += store[currentGlove].damage;
                uiCoins.innerText = coins;

                scaleTarget = 0.7;
                bagMat.color.setHex(0xffffff); // White flash
                setTimeout(() => bagMat.color.setHex(0x2980b9), 80);

                const text = document.createElement("div");
                text.className = "hit-text";
                text.innerText =
                    punchSounds[Math.floor(Math.random() * punchSounds.length)];
                text.style.left = `${window.innerWidth / 2 + (Math.random() * 100 - 50)}px`;
                text.style.top = `${window.innerHeight / 2 - 120 + (Math.random() * 40 - 20)}px`;
                document.body.appendChild(text);
                setTimeout(() => text.remove(), 600);
            }

            // Don't trigger punches if clicking inside the store panel or buttons
            window.addEventListener("mousedown", (e) => {
                if (
                    !e.target.closest("#store-panel") &&
                    e.target.id !== "store-btn" &&
                    !isPunching
                )
                    triggerPunchAnim("straight");
            });
            window.addEventListener(
                "touchstart",
                (e) => {
                    if (
                        !e.target.closest("#store-panel") &&
                        e.target.id !== "start-btn" &&
                        e.target.id !== "store-btn" &&
                        !isPunching
                    )
                        triggerPunchAnim("straight");
                },
                { passive: false },
            );

            // --- ANIMATION LOOP ---
            function animate() {
                requestAnimationFrame(animate);

                if (isPunching && activeGlove) {
                    punchProgress += 0.15;
                    let restPos =
                        activeGlove === leftGlove ? leftRest : rightRest;

                    if (punchProgress < 0.5) {
                        let t = punchProgress * 2;
                        activeGlove.position.lerpVectors(
                            restPos,
                            punchTarget,
                            Math.sin((t * Math.PI) / 2),
                        );
                    } else if (punchProgress < 1.0) {
                        let t = (1 - punchProgress) * 2;
                        activeGlove.position.lerpVectors(
                            restPos,
                            punchTarget,
                            t,
                        );
                    } else {
                        activeGlove.position.copy(restPos);
                        activeGlove.rotation.set(0, 0, 0);
                        isPunching = false;
                        activeGlove = null;
                    }
                }

                velX += (0 - pivot.rotation.x) * spring;
                velZ += (0 - pivot.rotation.z) * spring;
                velX *= friction;
                velZ *= friction;

                pivot.rotation.x += velX;
                pivot.rotation.z += velZ;
                pivot.rotation.x = Math.max(
                    Math.min(pivot.rotation.x, 1.2),
                    -1.2,
                );
                pivot.rotation.z = Math.max(
                    Math.min(pivot.rotation.z, 1.2),
                    -1.2,
                );

                scaleTarget += (1 - scaleTarget) * 0.1;
                bagGroup.scale.y = scaleTarget;
                bagGroup.scale.x = 1 + (1 - scaleTarget) * 0.5;
                bagGroup.scale.z = bagGroup.scale.x;

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        </script>
    </body>
</html>
