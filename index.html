<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMilk Virtual Drink</title>
    <style>
        :root {
            --milk-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 15%;
            text-align: center;
            z-index: 10;
            width: 80%;
        }

        h1 { font-weight: 300; letter-spacing: 2px; }

        .glass {
            width: 160px;
            height: 280px;
            border: 5px solid var(--glass-border);
            border-top: none;
            border-radius: 0 0 25px 25px;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .milk {
            width: 250%;
            height: 90%;
            background: var(--milk-color);
            position: absolute;
            bottom: 0;
            left: -75%;
            transform-origin: center bottom;
            transition: transform 0.1s linear;
            /* Simple gloss effect */
            background: linear-gradient(to bottom, #ffffff 0%, #f0f0f0 100%);
        }

        button {
            padding: 18px 40px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 50px;
            border: none;
            background: #fff;
            color: #000;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="status">Ready?</h1>
        <button id="startBtn">Start Drinking</button>
    </div>

    <div class="glass">
        <div id="milk" class="milk"></div>
    </div>

    <script>
        const milk = document.getElementById('milk');
        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('status');
        let milkLevel = 90;
        let isActive = false;

        startBtn.addEventListener('click', async () => {
            // Requesting permission for iOS 13+ sensors
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        setupGame();
                    } else {
                        alert("Permission was denied.");
                    }
                } catch (err) {
                    console.error(err);
                }
            } else {
                // Non-iOS or older browser
                setupGame();
            }
        });

        function setupGame() {
            isActive = true;
            document.getElementById('ui').style.opacity = '0';
            setTimeout(() => { document.getElementById('ui').style.display = 'none'; }, 500);
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            if (!isActive) return;

            // gamma is left-to-right tilt (roll)
            // beta is front-to-back tilt (pitch)
            let roll = event.gamma || 0;
            let pitch = event.beta || 0;

            // Rotate milk surface to stay level with the horizon
            milk.style.transform = `rotate(${-roll}deg)`;

            // If phone is tilted past 100 degrees (tilted toward face)
            if (pitch > 100 && milkLevel > 0) {
                milkLevel -= 0.4; // Speed of "drinking"
                milk.style.height = milkLevel + '%';
            }

            // If glass is empty
            if (milkLevel <= 0) {
                finishDrinking();
            }
        }

        function finishDrinking() {
            isActive = false;
            window.removeEventListener('deviceorientation', handleOrientation);

            const ui = document.getElementById('ui');
            ui.style.display = 'block';
            ui.style.opacity = '1';
            statusText.innerText = "Refreshing!";
            startBtn.innerText = "Refill Glass";

            startBtn.onclick = () => { location.reload(); };
        }
    </script>
</body>
</html>
