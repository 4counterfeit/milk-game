<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <title>3D Punch Survival</title>
        
        <link rel="stylesheet" href="style.css" />
        
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#1a1a1a" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    </head>
    <body>
        <div id="canvas-container"></div>

        <div id="ui">
            <div id="uiCoins">SCORE: 0</div>
            <div class="danger-box">
                DISTANCE
                <div id="danger-bar-bg">
                    <div id="danger-bar-fill"></div>
                </div>
            </div>
        </div>

        <div id="start-screen" class="overlay-screen">
            <h1 class="epic-title">3D PUNCH</h1>
            <div class="rules-card">
                <span style="color: #2979ff">●</span> BLUE: NEUTRAL<br />
                <span style="color: #ffcc00">●</span> YELLOW: STOP!<br />
                <span style="color: #e23636">●</span> RED: COUNTER!<br />
            </div>
            <button class="epic-btn" onclick="initGame()">FIGHT!</button>
        </div>

        <div id="game-over-screen" class="overlay-screen" style="display: none">
            <h1 class="ko-text">K.O.</h1>
            <h2 id="final-score">SCORE: 0</h2>
            <button class="epic-btn" onclick="location.reload()">RETRY</button>
        </div>

        <script src="script.js"></script>
    </body>
</html>
