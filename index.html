<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Motion Kick the Punching Bag</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap");

            body {
                margin: 0;
                overflow: hidden;
                background-color: #2d3436;
                font-family: "Poppins", sans-serif;
                touch-action: none;
            }
            #canvas-container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 1;
            }

            /* Modern, clean UI overlay */
            #ui {
                position: absolute;
                top: 40px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
                font-size: 22px;
                font-weight: 700;
                color: white;
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(8px);
                padding: 8px 24px;
                border-radius: 30px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                pointer-events: none;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            #instructions {
                position: absolute;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.4);
                padding: 10px 24px;
                border-radius: 20px;
                color: #f1f2f6;
                font-weight: 400;
                font-size: 14px;
                z-index: 10;
                pointer-events: none;
                white-space: nowrap;
                letter-spacing: 0.5px;
            }

            /* Cleaner Start Screen */
            #start-screen {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(15, 15, 20, 0.85);
                backdrop-filter: blur(10px);
                z-index: 50;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                color: white;
            }
            #start-screen h1 {
                margin: 0 0 10px 0;
                font-size: 28px;
                font-weight: 900;
                letter-spacing: 1px;
                color: #ff7675;
            }
            #start-screen p {
                margin: 0 0 40px 0;
                max-width: 80%;
                font-size: 14px;
                line-height: 1.6;
                color: #dfe6e9;
                font-weight: 400;
            }

            #start-btn {
                background: linear-gradient(135deg, #ff7675, #d63031);
                border: none;
                padding: 16px 40px;
                border-radius: 30px;
                font-family: "Poppins", sans-serif;
                font-size: 18px;
                font-weight: 700;
                color: white;
                cursor: pointer;
                box-shadow: 0 8px 20px rgba(214, 48, 49, 0.4);
                transition: transform 0.1s ease;
            }
            #start-btn:active {
                transform: scale(0.92);
            }

            .hit-text {
                position: absolute;
                color: #ffeaa7;
                font-weight: 900;
                font-size: 30px;
                pointer-events: none;
                text-shadow: 0px 3px 10px rgba(214, 48, 49, 0.8);
                z-index: 5;
                animation: floatUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)
                    forwards;
            }
            @keyframes floatUp {
                0% {
                    opacity: 1;
                    transform: translateY(0) scale(0.5);
                }
                100% {
                    opacity: 0;
                    transform: translateY(-100px) scale(1.2);
                }
            }
        </style>
    </head>
    <body>
        <div id="start-screen">
            <h1>🥊MOTION PUNCHER</h1>
            <p>
                Thrust your phone forward for a straight jab.<br />Swing left or
                right for hooks!
            </p>
            <button id="start-btn" onclick="initGame()">START</button>
        </div>

        <div id="ui"><span>🪙</span> <span id="coin-count">0</span></div>
        <div id="instructions">Tap screen or swing phone</div>

        <div id="canvas-container"></div>

        <script>
            let coins = 0;
            const uiCoins = document.getElementById("coin-count");

            // --- THREE.JS SETUP ---
            const container = document.getElementById("canvas-container");
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x74b9ff);

            const camera = new THREE.PerspectiveCamera(
                65,
                window.innerWidth / window.innerHeight,
                0.1,
                1000,
            );
            camera.position.set(0, -2, 35);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // --- THE PUNCHING BAG ---
            const pivot = new THREE.Group();
            pivot.position.set(0, 15, 0);
            scene.add(pivot);

            const ropeMat = new THREE.MeshStandardMaterial({ color: 0x2d3436 });
            const rope = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.15, 10, 8),
                ropeMat,
            );
            rope.position.y = -5;
            pivot.add(rope);

            const bagGroup = new THREE.Group();
            bagGroup.position.y = -13;
            pivot.add(bagGroup);

            const bagMat = new THREE.MeshStandardMaterial({
                color: 0xff7675,
                roughness: 0.4,
            });
            const bodyMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(2.5, 2.5, 6, 32),
                bagMat,
            );
            const topHemi = new THREE.Mesh(
                new THREE.SphereGeometry(
                    2.5,
                    32,
                    16,
                    0,
                    Math.PI * 2,
                    0,
                    Math.PI / 2,
                ),
                bagMat,
            );
            topHemi.position.y = 3;
            const botHemi = new THREE.Mesh(
                new THREE.SphereGeometry(
                    2.5,
                    32,
                    16,
                    0,
                    Math.PI * 2,
                    Math.PI / 2,
                    Math.PI / 2,
                ),
                bagMat,
            );
            botHemi.position.y = -3;
            bagGroup.add(bodyMesh, topHemi, botHemi);

            // --- 3D BOXING GLOVES ---
            const gloveGeo = new THREE.SphereGeometry(1.6, 32, 32);
            const gloveMat = new THREE.MeshStandardMaterial({
                color: 0xd63031,
                roughness: 0.2,
            });

            const leftGlove = new THREE.Mesh(gloveGeo, gloveMat);
            const rightGlove = new THREE.Mesh(gloveGeo, gloveMat);

            // TUCKED GLOVES INWARD FOR MOBILE SCREENS
            // X moved from 4.5 to 2.2 so they stay completely on screen
            // Y moved from -5.5 to -4.5 so they aren't completely cropped at the bottom
            const leftRest = new THREE.Vector3(-2.2, -4.5, -12);
            const rightRest = new THREE.Vector3(2.2, -4.5, -12);

            leftGlove.position.copy(leftRest);
            rightGlove.position.copy(rightRest);

            camera.add(leftGlove);
            camera.add(rightGlove);
            scene.add(camera);

            // --- PHYSICS & ANIMATION VARIABLES ---
            let velX = 0,
                velZ = 0;
            const spring = 0.05,
                friction = 0.92;
            let scaleTarget = 1;

            let activeGlove = null;
            let punchProgress = 0;
            let punchTarget = new THREE.Vector3();
            let isPunching = false;

            let lastPunchTime = 0;
            const PUNCH_COOLDOWN = 350;

            // --- START GAME & SENSORS ---
            function initGame() {
                document.getElementById("start-screen").style.opacity = "0";
                setTimeout(
                    () =>
                        (document.getElementById("start-screen").style.display =
                            "none"),
                    300,
                );

                if (typeof DeviceMotionEvent.requestPermission === "function") {
                    DeviceMotionEvent.requestPermission()
                        .then((permissionState) => {
                            if (permissionState === "granted") {
                                window.addEventListener(
                                    "devicemotion",
                                    handleMotion,
                                );
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener("devicemotion", handleMotion);
                }
            }

            // --- MOTION LOGIC ---
            function handleMotion(event) {
                let accX = event.acceleration.x;
                let accZ = event.acceleration.z;

                if (accX === null) return;

                let now = Date.now();
                if (now - lastPunchTime < PUNCH_COOLDOWN || isPunching) return;

                const THRESHOLD_FORWARD = -7;
                const THRESHOLD_SIDE = 6;

                if (accZ < THRESHOLD_FORWARD) {
                    triggerPunchAnim("straight");
                    lastPunchTime = now;
                } else if (accX < -THRESHOLD_SIDE) {
                    triggerPunchAnim("left");
                    lastPunchTime = now;
                } else if (accX > THRESHOLD_SIDE) {
                    triggerPunchAnim("right");
                    lastPunchTime = now;
                }
            }

            // --- VISUAL PUNCH LOGIC ---
            function triggerPunchAnim(type) {
                isPunching = true;
                punchProgress = 0;

                if (type === "straight") {
                    activeGlove = rightGlove;
                    punchTarget.set(0, 0, -22);
                    velZ -= 0.6;
                } else if (type === "left") {
                    activeGlove = leftGlove;
                    punchTarget.set(2, 2, -20);
                    velX += 0.4;
                    velZ -= 0.3;
                } else if (type === "right") {
                    activeGlove = rightGlove;
                    punchTarget.set(-2, 2, -20);
                    velX -= 0.4;
                    velZ -= 0.3;
                }

                setTimeout(() => {
                    spawnHitEffect(type);
                }, 100);
            }

            function spawnHitEffect(type) {
                coins += 10;
                uiCoins.innerText = coins;
                scaleTarget = 0.7;
                bagMat.color.setHex(0xffffff);
                setTimeout(() => bagMat.color.setHex(0xff7675), 80);

                const text = document.createElement("div");
                text.className = "hit-text";
                text.innerText = "BAM!";
                text.style.left = `${window.innerWidth / 2 + (Math.random() * 80 - 40)}px`;
                text.style.top = `${window.innerHeight / 2 - 120 + (Math.random() * 40 - 20)}px`;
                document.body.appendChild(text);
                setTimeout(() => text.remove(), 800);
            }

            window.addEventListener("mousedown", (e) => {
                if (!isPunching) triggerPunchAnim("straight");
            });
            window.addEventListener("touchstart", (e) => {
                if (e.target.id !== "start-btn" && !isPunching)
                    triggerPunchAnim("straight");
            });

            // --- ANIMATION LOOP ---
            function animate() {
                requestAnimationFrame(animate);

                if (isPunching && activeGlove) {
                    punchProgress += 0.15;
                    let restPos =
                        activeGlove === leftGlove ? leftRest : rightRest;

                    if (punchProgress < 0.5) {
                        let t = punchProgress * 2;
                        activeGlove.position.lerpVectors(
                            restPos,
                            punchTarget,
                            Math.sin((t * Math.PI) / 2),
                        );
                    } else if (punchProgress < 1.0) {
                        let t = (1 - punchProgress) * 2;
                        activeGlove.position.lerpVectors(
                            restPos,
                            punchTarget,
                            t,
                        );
                    } else {
                        activeGlove.position.copy(restPos);
                        isPunching = false;
                        activeGlove = null;
                    }
                }

                velX += (0 - pivot.rotation.x) * spring;
                velZ += (0 - pivot.rotation.z) * spring;
                velX *= friction;
                velZ *= friction;

                pivot.rotation.x += velX;
                pivot.rotation.z += velZ;
                pivot.rotation.x = Math.max(
                    Math.min(pivot.rotation.x, 1.2),
                    -1.2,
                );
                pivot.rotation.z = Math.max(
                    Math.min(pivot.rotation.z, 1.2),
                    -1.2,
                );

                scaleTarget += (1 - scaleTarget) * 0.1;
                bagGroup.scale.y = scaleTarget;
                bagGroup.scale.x = 1 + (1 - scaleTarget) * 0.5;
                bagGroup.scale.z = bagGroup.scale.x;

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        </script>
    </body>
</html>
